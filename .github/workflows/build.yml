name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      shell: powershell
      run: |
        if (Test-Path "app.py") {
            $target = "app.py"
        } elseif (Test-Path "plainapp.py") {
            $target = "plainapp.py"
        } else {
            $target = (Get-ChildItem -Filter *.py | Select-Object -First 1).Name
        }
        pyinstaller --noconfirm --onedir --windowed --name "Smart-Scheduler" $target

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Scheduler-EXE
        path: dist/Smart-Scheduler
